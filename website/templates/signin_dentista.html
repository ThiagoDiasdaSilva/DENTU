
{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Login Dentista - PrestoDento</title>
  <link rel="icon" href="{% static 'website/img/core-img/favicon.ico' %}">
  <link rel="stylesheet" href="{% static 'website/css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'website/css/font-awesome.min.css' %}">
  <style>
    /* Reutilizando os estilos que você já criou para manter a consistência */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f4f7fb; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    .top-bar { padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; background: #fff; border-bottom: 1px solid #e8edf2; }
    .top-bar a.home-link { font-size: 22px; color: #555; text-decoration: none; }
    
    .page-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .auth-card { background: #fff; border: 1px solid #dce3ec; border-radius: 10px; width: 100%; max-width: 440px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
    
    h2 { font-size: 24px; color: #222; text-align: center; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #d0d8e4; border-radius: 6px; font-size: 14px; background: #f8fafc; }
    
    .form-extras { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .toggle-wrap { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; }
    .forgot-link { font-size: 13px; color: #1d6aba; text-decoration: none; background: none; border: none; padding: 0; cursor: pointer; font-family: inherit; }
    
    .btn-main { width: 100%; padding: 12px; background: #1d6aba; color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
    .btn-main:hover { background: #155a9c; }

    /* Estilos para o dialog nativo */
    dialog {
      border: none;
      border-radius: 10px;
      padding: 0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      max-width: 500px;
      width: 90%;
      margin: auto;
    }
    dialog::backdrop {
      background: rgba(0, 0, 0, 0.5);
    }
    .modal-content-wrapper {
      padding: 20px;
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <a class="home-link" href="{% url 'index' %}"><i class="fa fa-home"></i></a>
    <a href="{% url 'index' %}"><img src="{% static 'website/img/core-img/logo.png' %}" alt="Dento" height="36"></a>
  </div>

  <div class="page-wrapper">
    <div class="auth-card">
      <h2>Login Dentista</h2>
      <form method="post" action="{% url 'signin_dentista' %}">
        {% csrf_token %}
        
        <div class="form-group">
          <label for="licenca">Licença</label>
          <input type="text" id="licenca" name="email_cpf" placeholder="Número de licença">
        </div>
        
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="••••••••">
        </div>
        
        <div class="form-extras">
          <div class="toggle-wrap">
            <input type="checkbox" id="lembrar" name="lembrar">
            <label for="lembrar" style="margin-bottom: 0; cursor: pointer; font-weight: normal;">Lembrar de mim</label>
          </div>
          <button type="button" class="forgot-link" onclick="document.getElementById('modalEsqueciSenha').showModal()">Esqueci a senha</button>
        </div>
        <button type="submit" class="btn-main">Login</button>
      </form>
    </div>
  </div>

  <dialog id="modalEsqueciSenha">
    <div class="modal-content-wrapper">
      <div class="modal-header border-0 d-flex justify-content-between align-items-center" style="padding-bottom: 15px;">
        <h5 class="modal-title" style="font-weight: 700; color: #222; margin: 0;">Recuperar senha</h5>
        <button type="button" class="close" onclick="document.getElementById('modalEsqueciSenha').close()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;" aria-label="Fechar">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <div class="modal-body">
        <p style="font-size: 14px; color: #666; margin-bottom: 18px;">
          Digite seu e-mail cadastrado e enviaremos um link para redefinir sua senha.
        </p>
        <form method="post" action="#">
          {% csrf_token %}
          <div class="form-group">
            <label for="reset-email" style="font-size: 13px; font-weight: 600;">E-mail</label>
            <input type="email" id="reset-email" name="reset-email" class="form-control"
              placeholder="seu@email.com"
              style="border-radius: 6px; font-size: 14px;">
          </div>
          <button type="submit" class="btn-main" style="margin-top: 8px;">
            Enviar link de recuperação
          </button>
        </form>
      </div>
    </div>
  </dialog>

  <script src="{% static 'website/js/jquery.min.js' %}"></script>
  <script src="{% static 'website/js/bootstrap.min.js' %}"></script>

  <script> 
    // Fechar o dialog ao clicar fora dele
    const dialog = document.getElementById('modalEsqueciSenha');
    dialog.addEventListener('click', (event) => {
      if (event.target === dialog) {
        dialog.close();
      }
    });
  </script>
</body>
</html>
