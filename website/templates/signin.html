
{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Login - Dento</title>
  <link rel="icon" href="{% static 'website/img/core-img/favicon.ico' %}">
  <link rel="stylesheet" href="{% static 'website/css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'website/css/font-awesome.min.css' %}">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .alert-erro    { background:#fdecea; color:#842029; border-radius:6px; padding:10px 14px; margin-bottom:16px; font-size:13px; }
    .alert-sucesso { background:#eafaf1; color:#0f5132; border-radius:6px; padding:10px 14px; margin-bottom:16px; font-size:13px; }

    body { background:#f4f7fb; font-family:'Segoe UI',sans-serif; min-height:100vh; display:flex; flex-direction:column; }

    .top-bar { padding:16px 32px; display:flex; align-items:center; justify-content:space-between; background:#fff; border-bottom:1px solid #e8edf2; }
    .top-bar a.home-link { font-size:22px; color:#555; text-decoration:none; }
    .top-bar a.home-link:hover { color:#1d6aba; }
    .top-bar img { height:36px; }

    .page-wrapper { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 16px; }

    .auth-card { background:#fff; border:1px solid #dce3ec; border-radius:10px; width:100%; max-width:440px; padding:40px 40px 32px; box-shadow:0 4px 24px rgba(0,0,0,0.07); }

    .auth-tabs { display:flex; border-bottom:2px solid #e8edf2; margin-bottom:28px; }
    .auth-tabs button { flex:1; background:none; border:none; padding:10px 0; font-size:15px; font-weight:600; color:#aaa; cursor:pointer; transition:color .2s; border-bottom:2px solid transparent; margin-bottom:-2px; }
    .auth-tabs button.active { color:#1d6aba; border-bottom-color:#1d6aba; }

    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    .form-group { margin-bottom:18px; }
    .form-group label { display:block; font-size:13px; font-weight:600; color:#444; margin-bottom:6px; }
    .form-group input { width:100%; padding:10px 14px; border:1px solid #d0d8e4; border-radius:6px; font-size:14px; background:#f8fafc; transition:border-color .2s; outline:none; }
    .form-group input:focus { border-color:#1d6aba; background:#fff; }

    .form-extras { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
    .toggle-wrap { display:flex; align-items:center; gap:8px; font-size:13px; color:#555; }
    .toggle { position:relative; width:40px; height:22px; }
    .toggle input { display:none; }
    .toggle-slider { position:absolute; inset:0; background:#ccc; border-radius:22px; cursor:pointer; transition:background .2s; }
    .toggle-slider::before { content:''; position:absolute; width:16px; height:16px; left:3px; top:3px; background:#fff; border-radius:50%; transition:transform .2s; }
    .toggle input:checked + .toggle-slider { background:#1d6aba; }
    .toggle input:checked + .toggle-slider::before { transform:translateX(18px); }

    .forgot-link { font-size:13px; color:#1d6aba; text-decoration:none; background:none; border:none; padding:0; cursor:pointer; font-family:inherit; }
    .forgot-link:hover { text-decoration:underline; }

    .btn-main { width:100%; padding:12px; background:#1d6aba; color:#fff; border:none; border-radius:6px; font-size:15px; font-weight:600; cursor:pointer; transition:background .2s; }
    .btn-main:hover { background:#155a9c; }

    .auth-footer { display:flex; justify-content:space-between; margin-top:20px; }
    .auth-footer a, .auth-footer button.link-btn { font-size:13px; color:#1d6aba; text-decoration:none; background:none; border:none; padding:0; cursor:pointer; font-family:inherit; }
    .auth-footer a:hover, .auth-footer button.link-btn:hover { text-decoration:underline; }

    /* Estilos para usar o elemento <dialog> nativo com comportamento similar ao Bootstrap modal */
    dialog {
      border: none;
      border-radius: 10px;
      padding: 0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      max-width: 500px;
      width: 90%;
      margin: auto; /* Centraliza na tela quando aberto com showModal() */
    }
    dialog::backdrop {
      background: rgba(0, 0, 0, 0.5); /* Fundo escuro */
    }
    .modal-content-wrapper {
      padding: 10px;
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <a class="home-link" href="{% url 'index' %}" title="Voltar ao início">
      <i class="fa fa-home"></i>
    </a>
    <a href="{% url 'index' %}">
      <img src="{% static 'website/img/core-img/logo.png' %}" alt="Dento">
    </a>
  </div>

  <div class="page-wrapper">
    <div class="auth-card">

      <div class="auth-tabs">
        <button class="active" onclick="switchTab('login', this)">Login</button>
        <button onclick="switchTab('cadastro', this)">Cadastre-se</button>
      </div>

      {% if erro %}
        <div class="alert-erro">{{ erro }}</div>
      {% endif %}
      {% if sucesso %}
        <div class="alert-sucesso">{{ sucesso }}</div>
      {% endif %}

      <div class="tab-panel active" id="panel-login">
        <form method="post" action="{% url 'signin' %}">
          {% csrf_token %}
          <input type="hidden" name="login" value="1">
          <input type="hidden" name="next" value="{{ request.GET.next }}">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="text" id="login-email" name="login-email" placeholder="seu@email.com">
          </div>
          <div class="form-group">
            <label for="login-senha">Senha</label>
            <input type="password" id="login-senha" name="login-senha" placeholder="••••••••">
          </div>
          
          <div class="form-extras">
            <div class="toggle-wrap">
              <label class="toggle" for="lembrar-checkbox" aria-label="Lembrar de mim">
                <input type="checkbox" name="lembrar" id="lembrar-checkbox">
                <span class="toggle-slider"></span>
              </label>
              <label for="lembrar-checkbox" style="margin-bottom: 0; cursor: pointer;">Lembrar de mim</label>
            </div>
            <button type="button" class="forgot-link" onclick="document.getElementById('modalEsqueciSenha').showModal()">Esqueci a senha</button>
          </div>

          <button type="submit" class="btn-main">Login</button>
        </form>
        <div class="auth-footer">
          <button type="button" class="link-btn" onclick="switchTab('cadastro', document.querySelectorAll('.auth-tabs button')[1])">Cadastre-se</button>
          <a href="{% url 'signin_dentista' %}">Login para dentistas</a>
        </div>
      </div>
      
      <div class="tab-panel" id="panel-cadastro">
        <form method="post" action="{% url 'signin' %}">
          {% csrf_token %}
          <input type="hidden" name="cadastro" value="1">
          <div class="form-group">
            <label for="cad-nome">Nome completo</label>
            <input type="text" id="cad-nome" name="user" placeholder="Seu nome">
          </div>
          <div class="form-group">
            <label for="cad-email">Email</label>
            <input type="email" id="cad-email" name="email" placeholder="seu@email.com">
          </div>
          <div class="form-group">
            <label for="cad-endereco">Endereço</label>
            <input type="text" id="cad-endereco" name="address" placeholder="Rua -----, 000">
          </div>
          <div class="form-group">
            <label for="cad-nasc">Data de nascimento</label>
            <input type="date" id="cad-nasc" name="date_of_birth">
          </div>
          <div class="form-group">
            <label for="cad-senha">Senha</label>
            <input type="password" id="cad-senha" name="senha" placeholder="••••••••">
          </div>
          <div class="form-group">
            <label for="cad-confirma">Confirmar senha</label>
            <input type="password" id="cad-confirma" placeholder="••••••••">
          </div>
          <button type="submit" class="btn-main">Criar conta</button>
        </form>
        <div class="auth-footer">
          <button type="button" class="link-btn" onclick="switchTab('login', document.querySelectorAll('.auth-tabs button')[0])">Já tenho conta</button>
        </div>
      </div>
      
      <dialog id="modalEsqueciSenha">
        <div class="modal-content-wrapper">
          <div class="modal-header border-0 d-flex justify-content-between align-items-center">
            <h5 class="modal-title" style="font-weight:700; color:#222; margin:0;">Recuperar senha</h5>
            <button type="button" class="close" onclick="document.getElementById('modalEsqueciSenha').close()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;"><span>&times;</span></button>
          </div>
          <div class="modal-body mt-3">
            <p style="font-size:14px; color:#666; margin-bottom:18px;">
              Digite seu e-mail cadastrado e enviaremos um link para redefinir sua senha.
            </p>
            <form method="post" action="#">
              {% csrf_token %}
              <div class="form-group">
                <label for="reset-email" style="font-size:13px; font-weight:600;">E-mail</label>
                <input type="email" id="reset-email" name="reset-email" class="form-control" placeholder="seu@email.com" style="border-radius:6px; font-size:14px;">
              </div>
              <button type="submit" class="btn-main" style="margin-top:8px;">Enviar link de recuperação</button>
            </form>
          </div>
        </div>
      </dialog>

    </div>
  </div>

  <script>
    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.auth-tabs button').forEach(b => b.classList.remove('active'));
      document.getElementById('panel-' + tab).classList.add('active');
      btn.classList.add('active');
    }

    document.querySelectorAll('form').forEach(form => {
      form.addEventListener('submit', function(e) {
        const inputs = this.querySelectorAll('input:not([type=hidden]):not([type=checkbox]):not([type=date])');
        let valido = true;

        inputs.forEach(input => {
          // CORREÇÃO: Condição afirmativa primeiro, evitando o uso do '!' como o SonarCloud exige
          if (input.value.trim()) {
            input.style.borderColor = '';
          } else {
            input.style.borderColor = '#e74c3c';
            valido = false;
          }
        });

        const senha    = this.querySelector('#cad-senha');
        const confirma = this.querySelector('#cad-confirma');
        if (senha && confirma && senha.value !== confirma.value) {
          confirma.style.borderColor = '#e74c3c';
          alert('As senhas não coincidem.');
          valido = false;
        }

        if (!valido) e.preventDefault();
      });
    });

    // Fechar o dialog ao clicar fora dele (no backdrop)
    const dialog = document.getElementById('modalEsqueciSenha');
    dialog.addEventListener('click', (event) => {
      if (event.target === dialog) {
        dialog.close();
      }
    });
  </script>

  <script src="{% static 'website/js/jquery.min.js' %}"></script>
  <script src="{% static 'website/js/bootstrap.min.js' %}"></script>

</body>
</html>
